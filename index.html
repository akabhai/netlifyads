<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unlock Access</title>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #0f172a);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #94a3b8);
            --card-bg: var(--tg-theme-secondary-bg-color, #1e293b);
            --btn-color: var(--tg-theme-button-color, #3b82f6);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background-color: var(--card-bg);
            padding: 30px 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .icon { font-size: 50px; margin-bottom: 15px; }

        h1 { font-size: 22px; margin-bottom: 10px; font-weight: 700; }

        .instruction {
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.4;
            border: 1px dashed #3b82f6;
        }

        .progress-wrapper {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            height: 10px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.4s ease;
        }

        .step-text {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--hint-color);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            background-color: var(--btn-color);
            color: var(--btn-text);
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .success {
            color: #10b981;
            margin-top: 20px;
            font-weight: bold;
            display: none;
            padding: 15px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🔓</div>
    <h1>Verify Access</h1>
    
    <div class="instruction">
        Click the button below and you will be redirected to our sponsor site. 
        <b>Wait for the page to load, then press BACK to return here.</b>
    </div>

    <div class="progress-wrapper">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="stepCounter" class="step-text">Steps Completed: 0 / 4</div>

    <button class="btn" id="actionBtn" onclick="handleVisit()">🚀 VISIT SPONSOR</button>

    <div class="success" id="successMsg">
        ✅ <b>Success!</b> Compression Unlocked.<br>Return to the bot now.
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const sponsorLink = "https://omg10.com/4/10784326";
    const params = new URLSearchParams(window.location.search);
    const user_id = params.get("user_id");

    let currentStep = 0;
    const totalSteps = 4;

    const btn = document.getElementById("actionBtn");
    const progressFill = document.getElementById("progressFill");
    const stepCounter = document.getElementById("stepCounter");
    const successMsg = document.getElementById("successMsg");

    function handleVisit() {
        if (!user_id) return alert("Error: User ID missing.");

        // Open the sponsor link in Telegram's browser
        tg.openLink(sponsorLink);

        // Update progress
        currentStep++;
        updateUI();

        // Check if finished
        if (currentStep >= totalSteps) {
            btn.disabled = true;
            btn.innerHTML = "⌛ Verifying...";
            unlockUser();
        } else {
            // Temporary "wait" state to prevent fast-clicking without visiting
            btn.disabled = true;
            btn.innerHTML = "⏳ Wait 5s...";
            setTimeout(() => {
                btn.disabled = false;
                btn.innerHTML = `🚀 VISIT SPONSOR (Step ${currentStep + 1})`;
            }, 5000);
        }
    }

    function updateUI() {
        const percent = (currentStep / totalSteps) * 100;
        progressFill.style.width = percent + "%";
        stepCounter.innerHTML = `Steps Completed: ${currentStep} / ${totalSteps}`;
    }

    function unlockUser() {
        const apiUrl = `https://melodic-seahorse-c0330f.netlify.app/.netlify/functions/unlock?user_id=${user_id}`;

        fetch(apiUrl)
            .then(res => res.json())
            .then(data => {
                if (data.status === "ok") {
                    btn.style.display = "none";
                    successMsg.style.display = "block";
                    stepCounter.innerText = "✅ Verification Complete!";
                    
                    tg.MainButton.setText("RETURN TO BOT");
                    tg.MainButton.show();
                    tg.MainButton.onClick(() => tg.close());
                } else {
                    throw new Error("Server rejected unlock");
                }
            })
            .catch(err => {
                alert("Server error. Please try again.");
                btn.disabled = false;
                btn.innerHTML = "🔄 RETRY UNLOCK";
            });
    }
</script>

</body>
</html>
