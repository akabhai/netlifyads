<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unlock Compression</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="//libtl.com/sdk.js" data-zone="10712606" data-sdk="show_10712606"></script>

    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #0f172a);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #94a3b8);
            --card-bg: var(--tg-theme-secondary-bg-color, #1e293b);
            --btn-color: var(--tg-theme-button-color, #22c55e);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: var(--card-bg); padding: 30px 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .icon { font-size: 50px; margin-bottom: 10px; animation: float 3s ease-in-out infinite; }
        h1 { font-size: 24px; margin-bottom: 8px; font-weight: 700; }
        p { color: var(--hint-color); font-size: 15px; margin-bottom: 25px; line-height: 1.5; }
        .progress-wrapper { width: 100%; background: rgba(0,0,0,0.2); border-radius: 10px; height: 12px; margin-bottom: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #3b82f6, #10b981); border-radius: 10px; transition: width 0.5s ease; }
        .progress-text { font-size: 14px; font-weight: 600; margin-bottom: 20px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; background: var(--btn-color); color: var(--btn-text); transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .success { color: #10b981; margin-top: 20px; font-weight: bold; font-size: 15px; display: none; padding: 10px; background: rgba(16,185,129,0.1); border-radius: 10px; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🔓</div>
    <h1>Unlock Compression</h1>
    <p>Watch 3 short ads to activate <b>6 hours</b> of unlimited compression.</p>

    <div class="progress-wrapper">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">Ads watched: 0 / 3</div>

    <button class="btn" id="adBtn" onclick="watchAd()">▶ Watch Ad</button>

    <div class="success" id="successMsg">🎉 Compression unlocked! Return to the bot.</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    tg.MainButton.color = tg.themeParams.button_color || "#22c55e";
    tg.MainButton.textColor = tg.themeParams.button_text_color || "#ffffff";

    const params = new URLSearchParams(window.location.search);
    const user_id = params.get("user_id");

    let adsWatched = 0;
    const totalAds = 3;
    const btn = document.getElementById("adBtn");
    const progressFill = document.getElementById("progressFill");
    const progressText = document.getElementById("progressText");
    const successMsg = document.getElementById("successMsg");

    function watchAd() {
        if (!user_id) return alert("Error: Missing User ID.");

        btn.disabled = true;
        btn.innerHTML = "⏳ Loading Ad...";

        if (typeof show_10712606 === "function") {
            show_10712606().then(() => {
                adsWatched++;
                updateProgress();

                if (adsWatched >= totalAds) {
                    btn.style.display = 'none';
                    unlockUser();
                } else {
                    btn.disabled = false;
                    btn.innerHTML = "▶ Watch Next Ad";
                }
            }).catch((err) => {
                console.error("Ad Error:", err);
                btn.disabled = false;
                btn.innerHTML = "▶ Watch Ad";
            });
        } else {
            alert("Ad blocker detected! Please disable it.");
            btn.disabled = false;
            btn.innerHTML = "▶ Watch Ad";
        }
    }

    function updateProgress() {
        progressText.innerText = `Ads watched: ${adsWatched} / ${totalAds}`;
        progressFill.style.width = ((adsWatched / totalAds) * 100) + "%";
    }

    function unlockUser() {
        progressText.innerText = "⏳ Unlocking server access...";
        
        // 🔴 CRITICAL FIX: Absolute URL to your Netlify function
        const apiUrl = `https://melodic-seahorse-c0330f.netlify.app/.netlify/functions/unlock?user_id=${user_id}`;

        fetch(apiUrl)
            .then(res => res.json())
            .then(data => {
                // 🔴 CRITICAL FIX: Explicitly check for successful JSON response
                if(data.status !== "ok") {
                    throw new Error(data.message || "Unlock failed on server");
                }

                progressText.innerText = "✅ Unlocked Successfully!";
                successMsg.style.display = "block";

                tg.MainButton.setText("RETURN TO BOT");
                tg.MainButton.show();
                tg.MainButton.onClick(() => tg.close());
            })
            .catch(err => {
                console.error("Server Error:", err);
                alert("Failed to unlock compression. Please try again.");
                btn.style.display = 'flex';
                btn.disabled = false;
                btn.innerHTML = "🔄 Retry Unlock";
            });
    }
</script>
</body>
</html>
